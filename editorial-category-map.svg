<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Institutional memory category map visual</title>
  <desc id="desc">A category map contrasting meeting notes, knowledge bases, enterprise search, and institutional memory infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061725"/><stop offset="1" stop-color="#163443"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#243E4B"/><stop offset="1" stop-color="#102A38"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F2C76C"/><stop offset="1" stop-color="#D6A24A"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1400" height="920" rx="44" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="106" y="94" width="1188" height="724" rx="34" fill="#0B1D2D" stroke="#6FB7B7" stroke-opacity=".22"/>
    <text x="158" y="166" fill="#D6A24A" font-family="Inter, Arial" font-size="18" font-weight="800" letter-spacing="3">CATEGORY MAP</text>
    <text x="158" y="230" fill="#F6F4F0" font-family="Georgia, serif" font-size="58" font-weight="700">Notes are an artifact.</text>
    <text x="158" y="296" fill="#F6F4F0" font-family="Georgia, serif" font-size="58" font-weight="700">Memory is infrastructure.</text>
    <g font-family="Inter, Arial">
      <rect x="166" y="402" width="250" height="188" rx="24" fill="url(#card)" stroke="#6FB7B7" stroke-opacity=".22"/>
      <text x="198" y="462" fill="#F6F4F0" font-size="24" font-weight="800">Meeting notes</text>
      <text x="198" y="510" fill="#6FB7B7" font-size="16">Useful after one call</text>
      <text x="198" y="542" fill="#6FB7B7" font-size="16">Weak as history</text>
      <rect x="466" y="402" width="250" height="188" rx="24" fill="url(#card)" stroke="#6FB7B7" stroke-opacity=".22"/>
      <text x="498" y="462" fill="#F6F4F0" font-size="24" font-weight="800">Knowledge base</text>
      <text x="498" y="510" fill="#6FB7B7" font-size="16">Waits for humans</text>
      <text x="498" y="542" fill="#6FB7B7" font-size="16">Often goes stale</text>
      <rect x="766" y="402" width="250" height="188" rx="24" fill="url(#card)" stroke="#6FB7B7" stroke-opacity=".22"/>
      <text x="798" y="462" fill="#F6F4F0" font-size="24" font-weight="800">Enterprise search</text>
      <text x="798" y="510" fill="#6FB7B7" font-size="16">Finds existing docs</text>
      <text x="798" y="542" fill="#6FB7B7" font-size="16">Cannot create records</text>
      <rect x="1066" y="366" width="250" height="260" rx="24" fill="#173846" stroke="url(#gold)" stroke-width="3"/>
      <text x="1098" y="452" fill="#D6A24A" font-size="17" font-weight="800" letter-spacing="2">SABERRA</text>
      <text x="1098" y="500" fill="#F6F4F0" font-size="27" font-weight="800">Institutional</text>
      <text x="1098" y="536" fill="#F6F4F0" font-size="27" font-weight="800">memory</text>
      <text x="1098" y="590" fill="#D6A24A" font-size="16">Capture, review, retrieve</text>
    </g>
    <path d="M416 496h50M716 496h50M1016 496h50" stroke="#D6A24A" stroke-width="3" stroke-dasharray="8 10"/>
    <g>
      <rect x="426" y="678" width="548" height="56" rx="18" fill="#102A38" stroke="#6FB7B7" stroke-opacity=".26"/>
      <text x="472" y="713" fill="#F6F4F0" font-family="Inter, Arial" font-size="18" font-weight="800">The decision is lost when nobody can find it later.</text>
    </g>
  </g>
</svg>
