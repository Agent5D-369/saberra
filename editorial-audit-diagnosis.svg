<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Organizational Memory Audit diagnosis visual</title>
  <desc id="desc">A premium dashboard style audit report showing institutional memory risk bands and leakage points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061725"/><stop offset="1" stop-color="#163443"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F0C66A"/><stop offset="1" stop-color="#D6A24A"/></linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#6FB7B7"/><stop offset="1" stop-color="#1E6D78"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="860" rx="42" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="108" y="94" width="984" height="668" rx="32" fill="#102A38" stroke="#6FB7B7" stroke-opacity=".24"/>
    <text x="158" y="156" fill="#D6A24A" font-family="Inter, Arial" font-size="18" font-weight="700" letter-spacing="3">MEMORY AUDIT</text>
    <text x="158" y="212" fill="#F6F4F0" font-family="Georgia, serif" font-size="54" font-weight="700">Find the leaks before</text>
    <text x="158" y="272" fill="#F6F4F0" font-family="Georgia, serif" font-size="54" font-weight="700">they become departures.</text>
    <g>
      <circle cx="282" cy="464" r="112" fill="#0B1D2D" stroke="#D6A24A" stroke-width="3"/>
      <text x="239" y="448" fill="#F6F4F0" font-family="Inter, Arial" font-size="70" font-weight="800">37</text>
      <text x="202" y="492" fill="#6FB7B7" font-family="Inter, Arial" font-size="17" font-weight="700">SERIOUS RISK</text>
    </g>
    <g font-family="Inter, Arial">
      <g>
        <text x="474" y="378" fill="#F6F4F0" font-size="18" font-weight="700">Decision retrieval</text>
        <rect x="474" y="400" width="430" height="14" rx="7" fill="#243E4B"/>
        <rect x="474" y="400" width="338" height="14" rx="7" fill="url(#gold)"/>
        <text x="930" y="416" fill="#D6A24A" font-size="16" font-weight="700">High</text>
      </g>
      <g>
        <text x="474" y="462" fill="#F6F4F0" font-size="18" font-weight="700">Key-person memory</text>
        <rect x="474" y="484" width="430" height="14" rx="7" fill="#243E4B"/>
        <rect x="474" y="484" width="388" height="14" rx="7" fill="url(#gold)"/>
        <text x="930" y="500" fill="#D6A24A" font-size="16" font-weight="700">Critical</text>
      </g>
      <g>
        <text x="474" y="546" fill="#F6F4F0" font-size="18" font-weight="700">Meeting follow-through</text>
        <rect x="474" y="568" width="430" height="14" rx="7" fill="#243E4B"/>
        <rect x="474" y="568" width="252" height="14" rx="7" fill="url(#teal)"/>
        <text x="930" y="584" fill="#6FB7B7" font-size="16" font-weight="700">Early</text>
      </g>
      <g>
        <text x="474" y="630" fill="#F6F4F0" font-size="18" font-weight="700">Onboarding context</text>
        <rect x="474" y="652" width="430" height="14" rx="7" fill="#243E4B"/>
        <rect x="474" y="652" width="320" height="14" rx="7" fill="url(#gold)"/>
        <text x="930" y="668" fill="#D6A24A" font-size="16" font-weight="700">High</text>
      </g>
    </g>
  </g>
  <g opacity=".45">
    <path d="M106 748c124-52 212-32 318 8 134 52 250 56 410-24 78-38 148-42 264-14" fill="none" stroke="#6FB7B7" stroke-width="2"/>
    <circle cx="982" cy="182" r="7" fill="#D6A24A"/>
    <circle cx="1028" cy="226" r="10" fill="#6FB7B7"/>
    <circle cx="996" cy="706" r="6" fill="#F6F4F0"/>
  </g>
