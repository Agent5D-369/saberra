<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title og-desc">
  <title id="og-title">Saberra -- Stop losing what your organization knows</title>
  <desc id="og-desc">Saberra institutional memory infrastructure. Decisions, context, and commitments captured from meetings and emails. Sera retrieves them on demand.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111F"/>
      <stop offset="0.55" stop-color="#0B1D2D"/>
      <stop offset="1" stop-color="#0D2430"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#F2D27C"/>
      <stop offset="1" stop-color="#D6A24A"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7BCACA"/>
      <stop offset="1" stop-color="#4AACAC"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 480C180 420 320 460 500 500C680 540 820 535 1000 475C1100 445 1160 440 1200 460V630H0Z" fill="#0D2430" opacity="0.7"/>
  <path d="M920 0C1060 22 1160 90 1200 200V0Z" fill="#1E6D78" opacity="0.22"/>

  <rect x="72" y="56" width="4" height="48" rx="2" fill="#D6A24A"/>
  <text x="88" y="90" fill="#F6F4F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="2">SABERRA</text>

  <rect x="72" y="118" width="290" height="32" rx="6" fill="#1E6D78" fill-opacity="0.28"/>
  <rect x="72" y="118" width="290" height="32" rx="6" stroke="#2B7E88" stroke-width="1" fill="none"/>
  <text x="88" y="139" fill="#7BCACA" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5">INSTITUTIONAL MEMORY INFRASTRUCTURE</text>

  <text x="72" y="222" fill="#F6F4F0" font-family="Georgia, serif" font-size="72" font-weight="700" letter-spacing="-1">Stop losing what</text>
  <text x="72" y="306" fill="#F6F4F0" font-family="Georgia, serif" font-size="72" font-weight="700" letter-spacing="-1">your organization</text>
  <text x="72" y="390" fill="#D6A24A" font-family="Georgia, serif" font-size="72" font-weight="700" letter-spacing="-1">already knows.</text>

  <text x="74" y="452" fill="#9DB5BA" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400">Meetings and emails become reviewed, searchable</text>
  <text x="74" y="484" fill="#9DB5BA" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400">organizational memory. Ask Sera anything.</text>

  <rect x="72" y="546" width="220" height="44" rx="22" fill="#D6A24A" fill-opacity="0.15"/>
  <rect x="72" y="546" width="220" height="44" rx="22" stroke="#D6A24A" stroke-width="1.5" fill="none"/>
  <text x="182" y="573" fill="#D6A24A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="0.5">saberra.com/audit</text>

  <!-- Right panel: Sera UI -->
  <rect x="760" y="80" width="380" height="420" rx="14" fill="#0B1D2D" stroke="#1E3A4A" stroke-width="1.5"/>
  <rect x="760" y="80" width="380" height="48" rx="14" fill="#0F2535"/>
  <rect x="760" y="114" width="380" height="14" fill="#0F2535"/>
  <circle cx="790" cy="104" r="6" fill="#2B6070"/>
  <circle cx="810" cy="104" r="6" fill="#2B6070"/>
  <circle cx="830" cy="104" r="6" fill="#2B6070"/>
  <text x="858" y="108" fill="#4A6A78" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600">Sera -- Organizational Memory</text>

  <rect x="780" y="148" width="280" height="38" rx="8" fill="#132838"/>
  <text x="796" y="171" fill="#6FBBBB" font-family="Arial, Helvetica, sans-serif" font-size="13">What did we decide on the Q4 budget?</text>

  <rect x="780" y="198" width="320" height="76" rx="8" fill="#0D3040"/>
  <rect x="780" y="198" width="4" height="76" rx="2" fill="#D6A24A"/>
  <text x="796" y="218" fill="#CFE1E2" font-family="Arial, Helvetica, sans-serif" font-size="12.5">On Oct 14, leadership approved $120k for Q4,</text>
  <text x="796" y="236" fill="#CFE1E2" font-family="Arial, Helvetica, sans-serif" font-size="12.5">contingent on November close review.</text>
  <text x="796" y="258" fill="#4A7A88" font-family="Arial, Helvetica, sans-serif" font-size="11">Source: Board call, Oct 14 transcript</text>

  <rect x="780" y="288" width="250" height="38" rx="8" fill="#132838"/>
  <text x="796" y="311" fill="#6FBBBB" font-family="Arial, Helvetica, sans-serif" font-size="13">Who owns vendor onboarding?</text>

  <rect x="780" y="338" width="320" height="58" rx="8" fill="#0D3040"/>
  <rect x="780" y="338" width="4" height="58" rx="2" fill="#D6A24A"/>
  <text x="796" y="358" fill="#CFE1E2" font-family="Arial, Helvetica, sans-serif" font-size="12.5">Maya Singh was assigned vendor onboarding</text>
  <text x="796" y="376" fill="#CFE1E2" font-family="Arial, Helvetica, sans-serif" font-size="12.5">in the Sep 30 ops review.</text>
  <text x="796" y="390" fill="#4A7A88" font-family="Arial, Helvetica, sans-serif" font-size="11">Source: Ops meeting, Sep 30</text>

  <rect x="780" y="418" width="320" height="40" rx="20" fill="#0A1E2C" stroke="#1E3A4A" stroke-width="1.2"/>
  <text x="800" y="443" fill="#2B5060" font-family="Arial, Helvetica, sans-serif" font-size="13">Ask Sera anything your org has decided...</text>
</svg>