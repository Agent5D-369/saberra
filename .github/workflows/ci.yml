name: CI

on:
  push:
    branches: [backend, stable]
  pull_request:
    branches: [stable]

jobs:
  typecheck:
    name: Type Check + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  notify-failure:
    name: Alert on Failure
    runs-on: ubuntu-latest
    needs: typecheck
    if: failure() && (github.ref == 'refs/heads/backend' || github.ref == 'refs/heads/stable')
    steps:
      - name: Send failure alert
        if: env.OPERATOR_NOTIFY_URL != '' && env.OPERATOR_NOTIFY_TOKEN != ''
        env:
          OPERATOR_NOTIFY_URL: ${{ secrets.OPERATOR_NOTIFY_URL }}
          OPERATOR_NOTIFY_TOKEN: ${{ secrets.OPERATOR_NOTIFY_TOKEN }}
        run: |
          curl -sf -X POST "$OPERATOR_NOTIFY_URL" \
            -H "Authorization: Bearer $OPERATOR_NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"subject\":\"[Saberra CI] Build failed on ${GITHUB_REF_NAME}\",\"message\":\"CI pipeline failed on branch ${GITHUB_REF_NAME}.\n\nCommit: ${GITHUB_SHA}\nAuthor: ${GITHUB_ACTOR}\nWorkflow: ${GITHUB_RUN_URL}\"}"
