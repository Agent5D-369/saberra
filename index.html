<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saberra</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f5ef;
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 700;
      }

      p {
        margin: 0;
        max-width: 44rem;
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Saberra</h1>
      <p>Site foundation is connected. GitHub Pages can serve this repository from the root of the main branch.</p>
    </main>
  </body>
</html>
