      <text x="18" y="21" fill="#1E6D78" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">Decisions</text>
      <rect x="128" width="82" height="30" rx="15" fill="#E8F2F1"/>
      <text x="148" y="21" fill="#1E6D78" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">Tasks</text>
      <rect x="222" width="75" height="30" rx="15" fill="#E8F2F1"/>
      <text x="241" y="21" fill="#1E6D78" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">Roles</text>
      <rect y="44" width="92" height="30" rx="15" fill="#E8F2F1"/>
      <text x="16" y="65" fill="#1E6D78" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">Policies</text>
      <rect x="105" y="44" width="86" height="30" rx="15" fill="#E8F2F1"/>
      <text x="125" y="65" fill="#1E6D78" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">People</text>
