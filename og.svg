<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ask Sera what your organization already knows</title>
  <desc id="desc">Saberra social sharing image showing meetings and emails becoming human-approved operating intelligence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111F"/>
      <stop offset="0.58" stop-color="#0B1D2D"/>
      <stop offset="1" stop-color="#102B36"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#F2D27C"/>
      <stop offset="1" stop-color="#D6A24A"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#7BCACA"/>
      <stop offset="1" stop-color="#1E6D78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 520C160 460 270 490 420 530C580 574 720 575 880 516C1018 465 1110 452 1200 486V630H0Z" fill="#102B36" opacity="0.62"/>
  <path d="M935 0C1058 18 1148 76 1200 166V0Z" fill="#1E6D78" opacity="0.28"/>
  <path d="M0 0H430C264 40 132 116 0 228Z" fill="#D6A24A" opacity="0.07"/>

