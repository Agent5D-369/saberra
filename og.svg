  <text x="72" y="392" fill="#F6F4F0" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">already knows.</text>

  <text x="78" y="464" fill="#CFE1E2" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="600">Meetings and emails become</text>
  <text x="78" y="499" fill="#CFE1E2" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="600">human-approved operating intelligence.</text>

