<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Saberra Institutional Memory Infrastructure</title>
  <desc id="desc">A Saberra social sharing image showing institutional memory, Sera, and source-backed answers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071523"/>
      <stop offset="0.55" stop-color="#0B1D2D"/>
      <stop offset="1" stop-color="#102B36"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#F4CF73"/>
      <stop offset="1" stop-color="#D6A24A"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#6FB7B7"/>
      <stop offset="1" stop-color="#1E6D78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="80" r="210" fill="#1E6D78" opacity="0.18"/>
  <circle cx="130" cy="560" r="240" fill="#D6A24A" opacity="0.09"/>
  <g transform="translate(72 58)">
    <path d="M84 14H176" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M65 105C35 96 30 60 54 39C72 24 101 24 136 25H187" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M67 105C90 112 116 111 144 112C183 113 204 132 203 163C202 196 174 214 134 214H52" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M73 62H198" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <circle cx="26" cy="76" r="7" fill="#6FB7B7"/>
    <circle cx="42" cy="153" r="9" fill="#6FB7B7"/>
    <circle cx="220" cy="43" r="8" fill="#6FB7B7"/>
    <path d="M244 70H302" stroke="#6FB7B7" stroke-width="13" stroke-linecap="round"/>
    <path d="M238 139H336" stroke="#6FB7B7" stroke-width="13" stroke-linecap="round"/>
  </g>
  <text x="330" y="140" fill="#F6F4F0" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700">Saberra</text>
  <text x="78" y="246" fill="#D6A24A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="5">INSTITUTIONAL MEMORY INFRASTRUCTURE</text>
  <text x="78" y="335" fill="#F6F4F0" font-family="Georgia, 'Times New Roman', serif" font-size="61" font-weight="700">Ask your organization</text>
  <text x="78" y="405" fill="#F6F4F0" font-family="Georgia, 'Times New Roman', serif" font-size="61" font-weight="700">what it already knows.</text>
  <text x="82" y="466" fill="#B9CAD0" font-family="Arial, Helvetica, sans-serif" font-size="26">Reviewed memory from Google Meet, emailed transcripts,</text>
  <text x="82" y="502" fill="#B9CAD0" font-family="Arial, Helvetica, sans-serif" font-size="26">email, Notion, and source-backed Sera answers.</text>
  <g filter="url(#shadow)" transform="translate(700 94)">
    <rect width="410" height="424" rx="28" fill="#F6F4F0"/>
    <rect x="26" y="24" width="358" height="74" rx="18" fill="#E8F1F0"/>
    <circle cx="63" cy="61" r="22" fill="#0B1D2D"/>
    <text x="55" y="70" fill="#F6F4F0" font-family="Georgia, serif" font-size="28">S</text>
    <text x="100" y="56" fill="#0B1D2D" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Sera answers from memory</text>
    <text x="100" y="82" fill="#1E6D78" font-family="Arial, Helvetica, sans-serif" font-size="16">Human-reviewed · source-backed</text>
    <rect x="26" y="126" width="358" height="78" rx="18" fill="#FFFFFF" stroke="#DDE8E7"/>
    <text x="48" y="161" fill="#0B1D2D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">What did we decide about the</text>
    <text x="48" y="187" fill="#0B1D2D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">vendor contract in April?</text>
    <rect x="26" y="224" width="358" height="134" rx="18" fill="#F0F5F4" stroke="#C8DCDC"/>
    <text x="48" y="262" fill="#0B1D2D" font-family="Arial, Helvetica, sans-serif" font-size="18">On April 14, the team approved a</text>
    <text x="48" y="289" fill="#0B1D2D" font-family="Arial, Helvetica, sans-serif" font-size="18">12-month renewal with revised pricing.</text>
    <text x="48" y="318" fill="#0B1D2D" font-family="Arial, Helvetica, sans-serif" font-size="18">Owner: Maya R.</text>
    <rect x="48" y="376" width="245" height="31" rx="15" fill="#0B1D2D"/>
    <text x="66" y="398" fill="#6FB7B7" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Source: Board Meeting, Apr 14</text>
  </g>
  <g transform="translate(76 548)">
    <rect width="260" height="36" rx="18" fill="#102B36" stroke="#1E6D78"/>
    <text x="22" y="24" fill="#6FB7B7" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">20-database Memory OS</text>
    <rect x="284" width="214" height="36" rx="18" fill="#102B36" stroke="#1E6D78"/>
    <text x="306" y="24" fill="#6FB7B7" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Zero behavior change</text>
    <rect x="522" width="190" height="36" rx="18" fill="#102B36" stroke="#1E6D78"/>
    <text x="544" y="24" fill="#6FB7B7" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Your workspace</text>
  </g>
</svg>
